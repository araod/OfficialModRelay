syntax = "proto3";

package devvit.plugin.externalendpoints.v1alpha;

import "google/protobuf/timestamp.proto";

option go_package = "github.snooguts.net/reddit/reddit-devplatform-monorepo/go-common/generated/protos/types/devvit/plugin/externalendpoints";
option java_package = "com.reddit.devvit.plugin.externalendpoints";

service ExternalEndpointsInternal {
  // Create a long-term token that can be used to validate requests from external sources
  rpc CreateToken(CreateTokenRequest) returns (CreateTokenResponse);
  // Validate a token (both short and long-term)
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  // List all tokens for an app
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
  // Revoke a token
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);
}

message Token {
  // the unique identifier for the token (uuid)
  string id = 1;
  // the name of the token
  // e.g. "Post Created Token"
  string name = 2;
  // the token value (only returned on creation)
  // e.g. devvit_at_abc123
  optional string value = 3;
  // the creation time of the token
  google.protobuf.Timestamp created_at = 4;
  // who created the token
  // e.g. "t2_1234567890"
  string created_by = 5;
  // whether the token is revoked
  bool revoked = 6;
}

message CreateTokenRequest {
  // user provided name to identify the token in the management UI
  // e.g. "Post Created Token"
  string token_name = 1;
}

message CreateTokenResponse {
  // the token that can be used to validate requests from external sources
  Token token = 1;
}

message ValidateTokenRequest {
  // the token to validate
  // e.g. devvit_at_abc123
  string token_value = 1;
}

message ValidateTokenResponse {
  // whether the token is valid
  bool valid = 1;
}

message ListTokensRequest {
  // the app ID to list tokens for
  string app_id = 1;
}

message ListTokensResponse {
  // the tokens for the app
  repeated Token tokens = 1;
}

message RevokeTokenRequest {
  // the token to revoke (uuid)
  string token_id = 1;
}

message RevokeTokenResponse {
  // whether the token was revoked
  bool revoked = 1;
}
